name: 'dns_cf_push'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: 'Install dependencies'
        run: if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: 'run dnscf'
        env:
          # 修改这里：使用你已有的 Secrets
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_RECORD_NAME: ${{ secrets.CF_RECORD_NAME }}
          CF_RECORD_TYPE: ${{ secrets.CF_RECORD_TYPE }}
          # CF_DNS_NAME 改为使用 CF_RECORD_NAME
          # 如果脚本需要 CF_DNS_NAME，可以同时设置
          CF_DNS_NAME: ${{ secrets.CF_RECORD_NAME }}
        run: python dnscf.py
